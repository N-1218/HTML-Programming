<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form >
        <fieldset>
            <legend>Student Registration Form</legend>
    <div>
    <label >Student Name: </label>
    <input type="text" name="name"placeholder="Enter first Name">
    <input type="text" name="name" placeholder="Enter Last Name"><br><br>
    <label>Father Name:</label>
    <input type="text" name=" father name" placeholder="Enter father Name"><br><br>
    <label >Mobile Number : </label>
    <input type="Number" name="Number" placeholder="Enter Mobile Number"><br><br>
    <label >Email ID :</label>
    <input type="email" name="email"placeholder="Enter Email ID"><br><br>
    <label >Password</label>
    <input type="password" name="password" placeholder="Enter Your Password"><br><br>
    <label >Gender</label><br><br>
    <input type="radio" name="gender">
    <label >Male</label>
    <input type="radio" name="gender"> 
    <label >Female</label>
    <input type="checkbox" name="gender" >
    <label >Others</label>
    <br><br>
    <label >Departments</label><br><br>
    <input type="checkbox" name="Departments">
    <label >IT</label>
    <input type="checkbox" name="Departments">
    <label >Civil</label>
    <input type="checkbox" name="Departments">
    <label >Sales</label>
    <input type="checkbox" name="Departments">
    <label >HR</label>
    <input type="checkbox" name="Departments">
    <label >Management</label>

    <br><br>
    <label >City : </label>
    <input type="text" name="City" placeholder="Enter City"><br><br>
    <label>Address : </label>
    <textarea name="Address"  placeholder="Enter Address" ></textarea><br><br>

    <button>Sign In </button>
    </div>
    </fieldset>
    </form>
    

</body>
</html>
